services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmapssaas
    volumes:
      - saas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gmapssaas"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.saas
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gmapssaas?sslmode=disable
      - ADDR=:8080
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "8081:8080"
    entrypoint: ["/bin/sh", "-c"]
    command: ["/app/gmapssaas serve || tail -f /dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.saas
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gmapssaas?sslmode=disable
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command: ["/app/gmapssaas worker || tail -f /dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  saas_pgdata:
